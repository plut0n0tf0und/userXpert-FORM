<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UserXpert Form Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-magenta: #B812B4; 
      --text-dark: #222222;
      --bg-light: #F9F9F9;
      --input-border: #DDDDDD;
    }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    .form-container {
      background-color: #FFFFFF;
      width: 100%;
      max-width: 500px;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      box-sizing: border-box;
      margin: 20px;
    }
    
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 10px;
      color: var(--text-dark);
    }
    
    p.subtitle {
      color: var(--primary-magenta);
      font-size: 18px;
      font-weight: 400;
      margin-top: 0;
      margin-bottom: 30px;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
      color: #555;
    }
    
    input[type="text"],
    input[type="email"],
    select,
    textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      box-sizing: border-box;
      transition: border-color 0.3s ease;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-magenta);
    }
    
    textarea {
      resize: vertical;
      height: 100px;
    }
    
    /* Neat Segmented Control / Radio Group */
    .radio-group {
      display: flex;
      background-color: #F1F1F1;
      border-radius: 8px;
      margin-top: 5px;
      padding: 4px;
    }
    
    .radio-group label {
      flex: 1;
      margin-bottom: 0;
      cursor: pointer;
    }
    
    .radio-group input[type="radio"] {
      display: none;
    }
    
    #loading {
      display: none;
      text-align: center;
      margin-top: 15px;
      color: var(--primary-magenta);
      font-weight: 600;
    }
    
    .branding {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .branding img {
      max-width: 250px;
      height: auto;
    }
    
    .radio-group span {
      display: block;
      text-align: center;
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      color: #777;
      transition: all 0.2s ease;
    }
    
    .radio-group input[type="radio"]:checked + span {
      background-color: #FFFFFF;
      color: var(--primary-magenta);
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    button {
      width: 100%;
      background-color: var(--primary-magenta);
      color: #FFFFFF;
      border: none;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: background-color 0.3s ease, transform 0.1s ease;
      margin-top: 10px;
    }
    
    button:hover {
      background-color: #9A0E96;
    }
    
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="form-container">
    
    <div class="branding">
      <img src="logo.png" alt="userXpert.in">
    </div>

    <h1>Accelerate Your Project!</h1>
    <p class="subtitle">Tell us what you need built</p>
    
    <form onsubmit="event.preventDefault(); alert('Form submitted! (This is just a local preview)');">
      
      <div class="input-group">
        <label>I am registering as a:</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="clientType" value="Individual" checked onchange="toggleCompanyField(false)">
            <span>Individual</span>
          </label>
          <label>
            <input type="radio" name="clientType" value="Company" onchange="toggleCompanyField(true)">
            <span>Company</span>
          </label>
        </div>
      </div>
      
      <div class="input-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" required placeholder="John Doe">
      </div>
      
      <div class="input-group" id="companyField" style="display: none;">
        <label for="companyName">Company Name</label>
        <input type="text" id="companyName" name="companyName" placeholder="e.g. Acme Corp">
      </div>
      
      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="john@example.com">
      </div>
      
      <div class="input-group">
        <label for="service">Service Needed</label>
        <select id="service" name="service" required>
          <option value="" disabled selected>Select a service...</option>
          <option value="Custom Websites">Custom Websites</option>
          <option value="E-commerce Solutions">E-commerce Solutions</option>
          <option value="UI/UX Design">UI/UX Design Services</option>
          <option value="Web Apps">Web Apps & Portals</option>
          <option value="Dashboards">Analytics Dashboards</option>
          <option value="AI Chatbots">AI Chatbots</option>
          <option value="Automation">Business Automation</option>
          <option value="SEO">SEO & Digital Marketing</option>
        </select>
      </div>
      
      <div class="input-group">
        <label for="details">Project Details (Optional)</label>
        <textarea id="details" name="details" placeholder="Tell us briefly about your goals..."></textarea>
      </div>
      
      <button type="submit" id="submitBtn">Register Inquiry</button>
      
    </form>
  </div>
  
  <script>
    function toggleCompanyField(show) {
      var field = document.getElementById('companyField');
      var input = document.getElementById('companyName');
      if (show) {
        field.style.display = 'block';
        input.required = true;
      } else {
        field.style.display = 'none';
        input.required = false;
        input.value = '';
      }
    }
  </script>
</body>
</html>
