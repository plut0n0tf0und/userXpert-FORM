<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Requirements | userXpert.in</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #B512B8; /* Matching the magenta from the logo/buttons */
      --primary-hover: #960e99;
      --primary-light: rgba(181, 18, 184, 0.1);
      --bg-color: #F8FAFC;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
      --input-bg: #F1F5F9;
      --success: #10B981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px 16px;
    }

    .form-container {
      width: 100%;
      max-width: 520px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05);
      position: relative;
      overflow: hidden;
    }

    /* Logo Header */
    .brand-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .brand-header img {
      height: 36px;
      margin-bottom: 12px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* Stepper */
    .progress-container {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin-bottom: 40px;
      padding: 0 10px;
    }

    .progress-container::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 10px;
      right: 10px;
      transform: translateY(-50%);
      height: 4px;
      background: var(--input-bg);
      border-radius: 4px;
      z-index: 1;
    }

    .progress-bar {
      position: absolute;
      top: 50%;
      left: 10px;
      transform: translateY(-50%);
      height: 4px;
      background: var(--primary);
      border-radius: 4px;
      z-index: 1;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    .step-indicator {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card-bg);
      border: 3px solid var(--input-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      position: relative;
      z-index: 2;
      transition: all 0.4s ease;
    }

    .step-indicator.active {
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-light);
    }
    
    .step-indicator.completed {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    /* SVG Check Icon for completed step */
    .step-indicator.completed::after {
      content: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>');
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
    }

    /* Form Steps */
    .form-step {
      display: none;
      animation: slideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      opacity: 0;
    }

    .form-step.active {
      display: block;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-title svg {
      stroke: var(--primary);
    }

    .input-group {
      margin-bottom: 24px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 8px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      width: 100%;
      padding: 14px 16px;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 12px;
      color: var(--text-main);
      font-size: 14px;
      transition: all 0.3s ease;
      outline: none;
      font-weight: 500;
    }

    input::placeholder, textarea::placeholder {
      color: #94A3B8;
      font-weight: 400;
    }

    input:focus, textarea:focus {
      background: var(--card-bg);
      border-color: var(--primary);
      box-shadow: 0 4px 12px var(--primary-light);
    }
    
    textarea {
      resize: vertical;
      min-height: 110px;
    }

    /* Custom Radio Buttons */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .radio-card {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--card-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .radio-card:hover {
      border-color: var(--primary-light);
      background: var(--primary-light);
    }

    .radio-card input[type="radio"] {
      position: absolute;
      opacity: 0;
    }

    .radio-card input[type="radio"]:checked + .radio-content {
      color: var(--primary);
    }
    
    .radio-card:has(input[type="radio"]:checked) {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .radio-icon {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border-color);
      border-radius: 50%;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .radio-card input[type="radio"]:checked ~ .radio-icon {
      border-color: var(--primary);
    }

    .radio-card input[type="radio"]:checked ~ .radio-icon::after {
      content: '';
      width: 12px;
      height: 12px;
      background: var(--primary);
      border-radius: 50%;
      animation: scaleIn 0.2s ease-out;
    }

    @keyframes scaleIn {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .radio-text {
      display: flex;
      flex-direction: column;
    }

    .radio-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-main);
    }
    .radio-card:has(input[type="radio"]:checked) .radio-title {
      color: var(--primary);
    }

    .radio-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 400;
    }

    .btn-group {
      display: flex;
      gap: 16px;
      margin-top: 40px;
    }

    button {
      flex: 1;
      padding: 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-next {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 14px var(--primary-light);
    }

    .btn-next:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--primary-light);
    }
    
    .btn-next:active {
      transform: translateY(0);
    }

    .btn-prev {
      background: white;
      color: var(--text-main);
      border: 1px solid var(--border-color);
    }

    .btn-prev:hover {
      background: var(--input-bg);
    }

    /* Error Shake */
    .error-shake {
      animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    /* Success State */
    .success-state {
      display: none;
      text-align: center;
      padding: 40px 0;
      animation: slideIn 0.5s ease;
    }

    .success-icon {
      width: 80px;
      height: 80px;
      background: #D1FAE5;
      color: var(--success);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .success-icon svg {
      width: 40px;
      height: 40px;
      stroke-width: 3;
    }
  </style>
</head>
<body>

  <div class="form-container">
    
    <div id="formContent">
      <div class="brand-header">
        <img src="userx%20logo%20light%20bg160.png" alt="userX.in" style="display: block; margin: 0 auto; height: 40px; max-width: 100%;">
      </div>
      
      <div class="header">
        <h1>Project Requirements</h1>
        <p>Let's build something amazing together.</p>
      </div>

      <!-- Progress Bar (2 Steps) -->
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="step-indicator active" id="indicator-1">1</div>
        <div class="step-indicator" id="indicator-2">2</div>
      </div>

      <form id="leadForm">
        
        <!-- STEP 1: Contact Details -->
        <div class="form-step active" id="step-1">
          <h2 class="step-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Contact Information
          </h2>
          
          <div class="input-group">
            <label for="name">Name of Contact *</label>
            <input type="text" id="name" name="name" required placeholder="John Doe">
          </div>

          <div class="input-group">
            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com">
          </div>

          <div class="input-group">
            <label for="whatsappNumber">WhatsApp Number *</label>
            <input type="tel" id="whatsappNumber" name="whatsappNumber" required placeholder="+1 234 567 8900">
          </div>

          <div class="input-group">
            <label for="altNumber">Alternate Contact Number (Optional)</label>
            <input type="tel" id="altNumber" name="altNumber" placeholder="+1 987 654 3210">
          </div>

          <div class="btn-group">
            <button type="button" class="btn-next" onclick="nextStep(1)">
              Continue
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
          </div>
        </div>

        <!-- STEP 2: Business & Service Details -->
        <div class="form-step" id="step-2">
          <h2 class="step-title">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>
            Business & Requirements
          </h2>
          
          <div class="input-group">
            <label for="businessName">Name of Business *</label>
            <input type="text" id="businessName" name="businessName" required placeholder="Acme Corp">
          </div>

          <div class="input-group">
            <label for="serviceOffered">Service or Product You Offer *</label>
            <input type="text" id="serviceOffered" name="serviceOffered" required placeholder="e.g. Real Estate Consulting">
          </div>
          
          <div class="input-group">
            <label for="reqSummary">What do you need? (1 line summary) *</label>
            <input type="text" id="reqSummary" name="reqSummary" required placeholder="e.g. A new e-commerce website">
          </div>

          <div class="input-group">
            <label for="expectedOutcome">Expected Outcome (1 line) *</label>
            <input type="text" id="expectedOutcome" name="expectedOutcome" required placeholder="e.g. Increase online sales by 20%">
          </div>

          <label style="margin-top: 32px; font-weight: 600;">How would you like to proceed? *</label>
          <div class="radio-group">
            <label class="radio-card">
              <input type="radio" name="assistanceType" value="fill_details" required checked>
              <div class="radio-icon"></div>
              <div class="radio-text">
                <span class="radio-title">Fill requirement details</span>
                <span class="radio-desc">Takes about 5 minutes</span>
              </div>
            </label>
            <label class="radio-card">
              <input type="radio" name="assistanceType" value="call_back">
              <div class="radio-icon"></div>
              <div class="radio-text">
                <span class="radio-title">Need help, call me back</span>
                <span class="radio-desc">We'll call your given phone number</span>
              </div>
            </label>
          </div>

          <div class="btn-group">
            <button type="button" class="btn-prev" onclick="prevStep(2)">Back</button>
            <button type="submit" class="btn-next" id="submitBtn">
              Submit Request
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            </button>
          </div>
        </div>

      </form>
    </div>

    <!-- Success View -->
    <div class="success-state" id="successState">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2 style="margin-bottom: 12px; font-weight: 700;">Submission Successful!</h2>
      <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 32px; line-height: 1.6;">
        We've received your requirements. A confirmation email has been sent to you. We'll be in touch very soon!
      </p>
      <div style="display:inline-flex; align-items:center; gap:8px; padding: 12px 24px; background: var(--primary-light); color: var(--primary); border-radius: 50px; font-weight: 600; font-size: 14px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        Redirecting to WhatsApp...
      </div>
    </div>

  </div>

  <script>
    // Extract URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const leadId = urlParams.get('lead_id') || 'Unknown';
    const missedCallPhone = urlParams.get('phone') || '';
    
    // Pre-fill phone if provided
    if(missedCallPhone) {
        document.getElementById('whatsappNumber').value = decodeURIComponent(missedCallPhone);
    }

    // Step Navigation Logic
    let currentStep = 1;
    
    function validateStep(step) {
      const stepDiv = document.getElementById('step-' + step);
      const inputs = stepDiv.querySelectorAll('input[required], textarea[required]');
      let isValid = true;
      
      inputs.forEach(input => {
        if (!input.value.trim()) {
          isValid = false;
          input.style.borderColor = '#EF4444';
          input.classList.add('error-shake');
          setTimeout(() => input.classList.remove('error-shake'), 400);
        } else {
          input.style.borderColor = 'transparent';
        }
      });
      return isValid;
    }

    function updateProgressBar() {
      // 2 steps total: so step 1 = 0%, step 2 = 100%
      const progress = ((currentStep - 1) / 1) * 100;
      document.getElementById('progressBar').style.width = progress + '%';
      
      for(let i=1; i<=2; i++) {
        const ind = document.getElementById('indicator-' + i);
        if (i < currentStep) {
          ind.className = 'step-indicator completed';
          ind.innerHTML = '';
        } else if (i === currentStep) {
          ind.className = 'step-indicator active';
          ind.innerHTML = i;
        } else {
          ind.className = 'step-indicator';
          ind.innerHTML = i;
        }
      }
    }

    function nextStep(step) {
      if (!validateStep(step)) return;
      
      document.getElementById('step-' + step).classList.remove('active');
      currentStep++;
      document.getElementById('step-' + currentStep).classList.add('active');
      updateProgressBar();
    }

    function prevStep(step) {
      document.getElementById('step-' + step).classList.remove('active');
      currentStep--;
      document.getElementById('step-' + currentStep).classList.add('active');
      updateProgressBar();
    }

    // Input interaction clearing error border
    document.querySelectorAll('input, textarea').forEach(el => {
      el.addEventListener('input', function() {
        if(this.value.trim() !== '') {
          this.style.borderColor = 'transparent';
        }
      });
    });

    // Form Submission
    document.getElementById('leadForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      if (!validateStep(2)) return;
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.innerHTML = 'Submitting...';
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.7';

      const formData = new FormData(this);
      
      const payload = {
        action: "submit_form",
        leadId: leadId,
        name: formData.get('name'),
        email: formData.get('email'),
        whatsappNumber: formData.get('whatsappNumber'),
        altNumber: formData.get('altNumber'),
        businessName: formData.get('businessName'),
        serviceOffered: formData.get('serviceOffered'),
        assistanceType: formData.get('assistanceType'),
        reqSummary: formData.get('reqSummary'),
        expectedOutcome: formData.get('expectedOutcome'),
        needDetails: "" // Blank for now as requested
      };

      const scriptURL = "https://script.google.com/macros/s/AKfycbxLRftndaH_znmmYtWfL9mmP9hoWXiPaBb8sOGBO5DPXZncXF4hX5akHaMgj8CEcMwW/exec";
      
      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        cache: 'no-cache',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        // Show Success UI
        document.getElementById('formContent').style.display = 'none';
        document.getElementById('successState').style.display = 'block';
        
        // Auto Redirect after 3s
        setTimeout(() => {
          let cleanPhone = payload.whatsappNumber.replace(/[^0-9+]/g, '');
          window.location.href = `whatsapp://send?phone=${cleanPhone}`;
        }, 3000);
      })
      .catch(error => {
        console.error('Error!', error.message);
        submitBtn.innerHTML = 'Error. Try Again.';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
      });
    });
  </script>
</body>
</html>
